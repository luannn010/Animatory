name: CI

on:
  push:
    branches: [master]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend (pytest + coverage)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      ANIMATORY_FAKE_EXECUTORS: "1"
      PYTEST_FORCE_EXIT: "1"   # see tests/conftest.py — avoids the interpreter-shutdown hang
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install backend (+ dev deps)
        run: python -m pip install --upgrade pip && pip install -e ".[dev]"

      - name: Run unit tests with coverage
        run: |
          python -m pytest \
            --cov=animatory --cov-branch \
            --cov-report=term-missing --cov-report=xml \
            -q

      - name: Coverage summary
        if: always()
        run: |
          {
            echo '### Backend coverage'
            echo '```'
            python -m coverage report || true
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload coverage.xml
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: coverage.xml
          if-no-files-found: ignore

  frontend:
    name: Frontend (vitest + coverage)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npx tsc -b

      - name: Run unit tests with coverage
        run: npm run test:coverage

      - name: Upload lcov report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-coverage
          path: frontend/coverage/lcov.info
          if-no-files-found: ignore
